name: Release DMG

# Push a version tag (e.g. v1.0.0) to build and publish the macOS DMG.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release + upload the DMG

jobs:
  build:
    # Apple Silicon runner — required: node-syphon's native binding is arm64-only.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Installs the optional node-syphon and runs its postinstall, which
      # downloads Syphon.framework (the runner has curl/unzip).
      - run: npm ci

      - run: npm run build

      # Build the DMG only. We do NOT let electron-builder publish: it uploads
      # artifacts in parallel and each upload races to "create" the GitHub
      # release, producing duplicate drafts with the assets split across them.
      - run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned — don't hunt for a Developer ID

      # Publish atomically: one draft release for the tag, with the DMG attached.
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*.dmg
          fail_on_unmatched_files: true
